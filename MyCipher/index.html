<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wyeth Cipher</title>
</head>
<body>


<h1>Wyeth Cipher</h1>
<p><label for="key">Enter a key: </label><input type="number" id="key" value=""></p>
<p><label for="plaintext">Enter your message: </label><input type="text" id="plaintext"></p>
<p><button id="encode" onclick="encode()">Encode</button></p>
<p id="ciphertext"></p>
</body>
<script>
  function encode() {
    let key = parseInt(document.getElementById("key").value);
    let plaintext = document.getElementById("plaintext").value.toUpperCase();
    let char = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let ciphertext = "";

    for (let i = 0; i < plaintext.length; i++) {
      let index = char.indexOf(plaintext[i]);

      if (index == -1) {
        ciphertext += plaintext[i];
        continue;
      }

      let shift = (key * i) % char.length;
      let newLocation = (index + shift) % char.length;

      ciphertext += char[newLocation];
    }

    document.getElementById("ciphertext").innerText = "Encoded: " + ciphertext;
  }
</script>
</html>
