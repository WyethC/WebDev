<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Country Game</title>

    <style>

        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        .box {
            background: white;
            width: 420px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px lightgray;
        }

        .food {
            font-size: 60px;
        }

        input {
            padding: 10px;
            width: 80%;
            margin-top: 15px;
        }

        button {
            padding: 10px 20px;
            margin-top: 15px;
            background: orange;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            color: blue;
        }

        .guesses {
            margin-top: 10px;
            color: darkred;
            font-size: 18px;
        }

    </style>
</head>

<body>

<div class="box">

    <h1>Food Origin Game</h1>

    <div class="food" id="foodEmoji"></div>

    <h2 id="foodName"></h2>

    <p>Guess the country!</p>

    <input type="text" id="guess" placeholder="Enter country">

    <br>

    <button onclick="checkGuess()">Guess</button>

    <div class="guesses" id="guessesLeft"></div>

    <div class="result" id="result"></div>

</div>

<script>


    const foods = [

        { name: "Pizza", emoji: "🍕", country: "Italy" },
        { name: "Sushi", emoji: "🍣", country: "Japan" },
        { name: "Taco", emoji: "🌮", country: "Mexico" },
        { name: "Croissant", emoji: "🥐", country: "France" },
        { name: "Curry", emoji: "🍛", country: "India" },
        { name: "Burger", emoji: "🍔", country: "USA" },
        { name: "Paella", emoji: "🥘", country: "Spain" },
        { name: "Poutine", emoji: "🍟", country: "Canada" },
        { name: "Kimchi", emoji: "🥬", country: "Korea" },
        { name: "Pretzel", emoji: "🥨", country: "Germany" }

    ];

    // Country coordinates
    const countries = {

        "Italy": { lat: 41.9, lon: 12.5 },
        "Japan": { lat: 36.2, lon: 138.2 },
        "Mexico": { lat: 23.6, lon: -102.5 },
        "France": { lat: 46.2, lon: 2.2 },
        "India": { lat: 20.5, lon: 78.9 },
        "USA": { lat: 37.1, lon: -95.7 },
        "Spain": { lat: 40.4, lon: -3.7 },
        "Canada": { lat: 56.1, lon: -106.3 },
        "South Korea": { lat: 36.5, lon: 127.9 },
        "Germany":{ lat: 51.1, lon: 10.4 },
        "China": { lat: 35.8, lon: 104.1 },
        "Brazil": { lat: -14.2, lon: -51.9 },
        "Argentina":{ lat: -38.4, lon: -63.6 },
        "Australia": { lat: -25.2, lon: 133.7 },
        "Russia": {lat: 61.5, lon: 105.3 },
        "Egypt": { lat: 26.8, lon: 30.8 },
        "Turkey": { lat: 38.9, lon: 35.2 },
        "Thailand": { lat: 15.8, lon: 100.9 },
        "Vietnam": { lat: 14.1, lon: 108.3 },
        "Greece":{lat: 39.0, lon: 22.0 }

    };

    // Random food
    let currentFood =
        foods[Math.floor(Math.random() * foods.length)];

    document.getElementById("foodEmoji").innerHTML =
        currentFood.emoji;

    document.getElementById("foodName").innerHTML =
        currentFood.name;



    let guessesLeft = 5;

    document.getElementById("guessesLeft").innerHTML =
        "Guesses Left: " + guessesLeft;


    function getDistance(lat1, lon1, lat2, lon2) {

        const R = 6371;

        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;

        const a =
            Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) *
            Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);

        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

        return Math.round(R * c);
    }



    function getDirection(guess, answer) {

        let vertical = "";
        let horizontal = "";

        if (guess.lat < answer.lat) {
            vertical = "North";
        } else {
            vertical = "South";
        }

        if (guess.lon < answer.lon) {
            horizontal = "East";
        } else {
            horizontal = "West";
        }

        return vertical + "-" + horizontal;
    }


    function checkGuess() {

        if (guessesLeft <= 0) {
            return;
        }

        const input =
            document.getElementById("guess").value.trim();

        if (!countries[input]) {

            document.getElementById("result").innerHTML =
                "Country not in database";

            return;
        }

        const correctCountry = currentFood.country;


        if (input === correctCountry) {

            document.getElementById("result").innerHTML =
                "🎉 Correct! The answer was " + correctCountry;

            guessesLeft = 0;

            document.getElementById("guessesLeft").innerHTML =
                "You won!";

            return;
        }

        guessesLeft--;

        const guessCoords = countries[input];
        const answerCoords = countries[correctCountry];

        const distance = getDistance(
            guessCoords.lat,
            guessCoords.lon,
            answerCoords.lat,
            answerCoords.lon
        );

        const direction =
            getDirection(guessCoords, answerCoords);

        document.getElementById("result").innerHTML =
            distance + " km away<br>" +
            "Go: " + direction;

        document.getElementById("guessesLeft").innerHTML =
            "Guesses Left: " + guessesLeft;

        if (guessesLeft === 0) {

            document.getElementById("result").innerHTML =
                "❌ Out of guesses!<br>" +
                "Answer: " + correctCountry;
        }
    }

</script>

</body>
</html>
