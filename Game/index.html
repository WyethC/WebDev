<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Country Game</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        .box {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px lightgray;
        }

        h1 {
            color: #d57a0f;
        }

        .food {
            font-size: 50px;
            margin: 20px;
        }

        input {
            width: 80%;
            padding: 10px;
            margin-top: 15px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: orange;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .direction {
            margin-top: 20px;
            font-size: 24px;
            color: blue;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>Food Origin Game</h1>

    <div class="food">🍕</div>

    <h2>Pizza</h2>

    <p>Guess the country!</p>

    <input type="text" placeholder="Type a country">

    <br>

    <button>Guess</button>

    <div class="direction">
        ⬅️ West
    </div>

</div>

</body>
</html>
